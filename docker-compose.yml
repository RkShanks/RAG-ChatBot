services:
  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-raguser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-ragpass}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:v1.13.1
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./config/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./config/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./config/grafana-alerts.yml:/etc/grafana/provisioning/alerting/alerts.yml
      - ./config/grafana-contact-points.yml:/etc/grafana/provisioning/alerting/contact-points.yml
    depends_on:
      - loki
    networks:
      - observability

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      - upload_data:/app/assets
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"
        labels: "service=backend"
    depends_on:
      mongodb:
        condition: service_healthy
      loki:
        condition: service_started
    networks:
      - internal       # reaches mongodb + qdrant
      - app            # serves API to nginx
      - observability  # exports /metrics to prometheus

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "certbot certonly --webroot --webroot-path=/var/www/certbot
      -d ${DOMAIN} --email ${CERTBOT_EMAIL} --agree-tos --non-interactive"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - backend
    networks:
      - observability

volumes:
  mongo_data:
  qdrant_data:
  upload_data:
  loki_data:
  grafana_data:
  prometheus_data:
  certbot_certs:
  certbot_www:

networks:
  internal:
    driver: bridge   # mongodb + qdrant: reachable only by backend
  app:
    driver: bridge   # nginx + frontend + backend: traffic-facing tier
  observability:
    driver: bridge   # prometheus + loki + grafana + backend: monitoring plane
