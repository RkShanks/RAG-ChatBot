services:
  mongodb:
    image: mongodb/mongodb-atlas-local:latest 
    container_name: local-atlas-hybrid
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=admin
      - MONGODB_INITDB_ROOT_PASSWORD=password
    ports:
      - "27007:27017"
    volumes:
      - ./mongodb_data:/data/db 
      - ./mongodb_mongot:/data/mongot 
    networks:
      backend:
    restart: always
networks:
  backend:
    driver: bridge
